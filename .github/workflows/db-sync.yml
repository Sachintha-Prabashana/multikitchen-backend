name: Nightly Database Sync (Heroku to Supabase)

on:
  schedule:
    # Runs at 12:00 AM Sri Lanka Time (UTC 18:30) every day
    - cron: '30 18 * * *'
  workflow_dispatch: # Manual sync button in GitHub Actions tab

jobs:
  sync-database:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client 17
        run: |
          # Add PostgreSQL official repository to get version 17
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          
          # Install specifically PostgreSQL client version 17
          sudo apt-get install -y postgresql-client-17

      - name: Syncing Data...
        env:
          HEROKU_URL: ${{ secrets.HEROKU_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          # Using absolute paths to ensure PostgreSQL 17 is used
          # This prevents "server version mismatch" errors with Heroku v17
          /usr/lib/postgresql/17/bin/pg_dump --no-owner --no-privileges --clean --if-exists "$HEROKU_URL" | /usr/lib/postgresql/17/bin/psql "$SUPABASE_URL"